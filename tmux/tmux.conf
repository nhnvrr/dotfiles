set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,tmux-256color:RGB"
set -ga terminal-overrides ",*:Ss=\\E[%p1%d q:Se=\\E[5 q"
set -g xterm-keys on
set -g default-shell "/bin/zsh"
set -g default-command "/bin/zsh -l"
set -g history-limit 100000
set -g mouse on
set -g set-clipboard on
set -g focus-events on
set -g status-keys vi
set -g renumber-windows on
set -g escape-time 10
set -g repeat-time 300
set -g allow-rename on
setw -g automatic-rename on
set -g cursor-style blinking-bar

set -g status on
set -g status-position bottom
set -g status-left-length 30
set -g status-right-length 60
# Theme (colores del status): Nord. theme.tmux es un symlink a tmux/nord.tmux en
# el repo (lo arma install.sh); -q evita error si todavía no fue linkeado.
source-file -q ~/.config/tmux/theme.tmux

set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
setw -g aggressive-resize on

# Keep new splits/windows in the current directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Move between panes with prefix + h/j/k/l.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Disable confirmation prompts for closing panes/windows.
bind x kill-pane
bind & kill-window

# Clipboard: copy selection to macOS clipboard.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Resize panes with repeatable H/J/K/L.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Toggle pane zoom (maximize/restore).
bind m resize-pane -Z

# Clear pane history.
bind -r C-k clear-history

# Quick reload.
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"
