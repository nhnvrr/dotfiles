# Kintsugi Dark Flared — port from the VSCode theme of the same name.
# Charcoal background with gold/amber accents, terracotta keywords, olive green.

[colors.primary]
background = "#1f1f24"
foreground = "#dddddd"

[colors.cursor]
text   = "#0e0e0e"
cursor = "#d4a943"

[colors.selection]
text       = "#dddddd"
background = "#2a313a"

[colors.normal]
black   = "#131314"
red     = "#b38f8f"
green   = "#a3be8c"
yellow  = "#ebcb8b"
blue    = "#6c7a8a"
magenta = "#b3a3d3"
cyan    = "#6ac6f2"
white   = "#dddddd"

[colors.bright]
black   = "#444444"
red     = "#d9a6a6"
green   = "#c3de9c"
yellow  = "#fbe4a8"
blue    = "#8fa3b3"
magenta = "#d3a3d3"
cyan    = "#8ac6f2"
white   = "#ffffff"
