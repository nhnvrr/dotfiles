# Nord — dark frío/azulado (arctic, north-bluish). Paleta oficial. Mismo palette
# que nvim. Fondo sólido (opacity 1.0). Nord es dark-only: light y dark lo usan.

[window]
opacity = 1.0
decorations_theme_variant = "Dark"

[colors.primary]
background = "#2e3440"
foreground = "#d8dee9"

[colors.cursor]
cursor = "#d8dee9"
text   = "#2e3440"

[colors.selection]
background = "#434c5e"
text       = "#d8dee9"

[colors.normal]
black   = "#3b4252"
red     = "#bf616a"
green   = "#a3be8c"
yellow  = "#ebcb8b"
blue    = "#81a1c1"
magenta = "#b48ead"
cyan    = "#88c0d0"
white   = "#e5e9f0"

[colors.bright]
black   = "#4c566a"
red     = "#bf616a"
green   = "#a3be8c"
yellow  = "#ebcb8b"
blue    = "#81a1c1"
magenta = "#b48ead"
cyan    = "#8fbcbb"
white   = "#eceff4"
