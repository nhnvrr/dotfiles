# ─── General ────────────────────────────────────────────
[general]
live_config_reload = true
import = ["~/.config/alacritty/theme.toml"]

# ─── Font ───────────────────────────────────────────────
[font]
size = 13.00
builtin_box_drawing = true

[font.normal]
family = "IoskeleyMonoTerm Nerd Font"
style = "Regular"

[font.bold]
family = "IoskeleyMonoTerm Nerd Font"
style = "Bold"

[font.italic]
family = "IoskeleyMonoTerm Nerd Font"
style = "SemiLight Italic"

[font.bold_italic]
family = "IoskeleyMonoTerm Nerd Font"
style = "Bold Italic"

# ─── Window ─────────────────────────────────────────────
[window]
startup_mode = "SimpleFullscreen"
decorations = "None"
opacity = 0.93
blur = true
padding = { x = 2, y = 2 }
dynamic_padding = true
option_as_alt = "Both"
resize_increments = true

# ─── Cursor ─────────────────────────────────────────────
[cursor]
unfocused_hollow = true
thickness = 0.20

[cursor.style]
shape = "Beam"
blinking = "On"

# ─── Mouse ──────────────────────────────────────────────
[mouse]
hide_when_typing = true

# ─── Shell ──────────────────────────────────────────────
[terminal.shell]
program = "/bin/zsh"
args = ["-l"]

# ─── Scrollback ─────────────────────────────────────────
[scrolling]
history = 100000
multiplier = 5

# ─── Selection ──────────────────────────────────────────
[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t/\\;="

# ─── Bell: flash visual sutil en vez de audio ───────────
[bell]
animation = "EaseOutExpo"
duration = 100
# Amarillo OneDark — flash cohesivo con el theme.
color = "#e5c07b"

# ─── Keybindings ────────────────────────────────────────
[[keyboard.bindings]]
key = "F"
mods = "Command|Control"
action = "ToggleSimpleFullscreen"

# Tamaño de fuente — útil para pairing, demos, o ajuste por monitor.
[[keyboard.bindings]]
key = "Equals"
mods = "Command"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Command"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "Key0"
mods = "Command"
action = "ResetFontSize"

# Nueva ventana — AeroSpace la tilea al lado automáticamente.
[[keyboard.bindings]]
key = "N"
mods = "Command"
action = "SpawnNewInstance"

# Búsqueda en scrollback.
[[keyboard.bindings]]
key = "F"
mods = "Command"
action = "SearchForward"

# Vi mode para navegar el scrollback con hjkl, copiar con y, buscar con /.
[[keyboard.bindings]]
key = "Escape"
mods = "Shift"
action = "ToggleViMode"
