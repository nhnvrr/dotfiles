# ─── General ────────────────────────────────────────────
[general]
live_config_reload = true

# ─── Font ───────────────────────────────────────────────
[font]
size = 13.0
# Box-drawing built-in: renderiza ─ │ ┌ ┐ sin gaps de hinting en tmux/htop.
builtin_box_drawing = true

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

# ─── Window ─────────────────────────────────────────────
[window]
startup_mode = "SimpleFullscreen"
# Full = title bar opaca CON semáforos. "Transparent" deja el contenido
# dibujarse por debajo de la barra y los semáforos pisan la primera línea;
# "Full" empuja el contenido debajo de un header sólido, sin solapamiento.
# decorations_theme_variant = "Dark" lo mantiene oscuro, sin barra de Aqua.
decorations = "Full"
# Match con paleta oscura — evita el title bar claro de Aqua sobre Kanso.
decorations_theme_variant = "Dark"
opacity = 0.93
# Habilita el blur del compositor; sin esto, opacity baja se ve "sucia".
blur = true
padding = { x = 0, y = 0 }
dynamic_padding = true
option_as_alt = "Both"
# Snap a grilla de celdas al redimensionar — sin medio-caracter de borde.
resize_increments = true

# ─── Cursor ─────────────────────────────────────────────
[cursor]
# Hueco cuando la ventana pierde foco — saber al instante qué terminal está activa.
unfocused_hollow = true
# Beam por default (0.15) se ve fino; 0.20 mejora legibilidad sin gritar.
thickness = 0.20

[cursor.style]
shape = "Beam"
blinking = "On"

# ─── Mouse ──────────────────────────────────────────────
[mouse]
hide_when_typing = true

# ─── Shell ──────────────────────────────────────────────
[terminal.shell]
program = "/opt/homebrew/bin/fish"
args = ["-l"]

# ─── Scrollback ─────────────────────────────────────────
[scrolling]
history = 100000
# Multiplier alto = más líneas por evento. Suma cuando NO estás en tmux
# (tmux toma control via alternate-screen). Default es 3, 5 da feel más
# ágil con trackpad sin volverse over-scroll.
multiplier = 5

# ─── Selection ──────────────────────────────────────────
[selection]
save_to_clipboard = true
# +/, \, ;, = → double-click selecciona paths completos, URLs, KEY=value.
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t/\\;="

# ─── Bell: flash visual sutil en vez de audio ───────────
[bell]
animation = "EaseOutExpo"
duration = 100
color = "#FFA066"

# ─── Colors: Kanso Zen ──────────────────────────────────
[colors.primary]
background = "#090E13"
foreground = "#C5C9C7"

[colors.cursor]
text   = "#090E13"
cursor = "#FFA066"

[colors.selection]
text       = "#C5C9C7"
background = "#393B44"

[colors.normal]
black   = "#090E13"
red     = "#C4746E"
green   = "#8A9A7B"
yellow  = "#C4B28A"
blue    = "#8BA4B0"
magenta = "#A292A3"
cyan    = "#8EA4A2"
white   = "#C8C093"

[colors.bright]
black   = "#32343C"
red     = "#E46876"
green   = "#87A987"
yellow  = "#E6C384"
blue    = "#7FB4CA"
magenta = "#938AA9"
cyan    = "#7AA89F"
white   = "#C5C9C7"

[[colors.indexed_colors]]
index = 16
color = "#B6927B"

[[colors.indexed_colors]]
index = 17
color = "#B98D7B"

# ─── Keybindings ────────────────────────────────────────
# Toggle del mismo modo en que arranca (SimpleFullscreen): cubre la pantalla
# sin entrar al Space dedicado de macOS. ToggleFullscreen (native) no andaba
# bien acá porque mezclaba los dos modos y dejaba la ventana inconsistente.
[[keyboard.bindings]]
key = "F"
mods = "Command|Control"
action = "ToggleSimpleFullscreen"

# Tamaño de fuente — útil para pairing, demos, o ajuste por monitor.
[[keyboard.bindings]]
key = "Equals"
mods = "Command"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Command"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "Key0"
mods = "Command"
action = "ResetFontSize"

# Nueva ventana — AeroSpace la tilea al lado automáticamente.
[[keyboard.bindings]]
key = "N"
mods = "Command"
action = "SpawnNewInstance"

# Búsqueda en scrollback.
[[keyboard.bindings]]
key = "F"
mods = "Command"
action = "SearchForward"

# Vi mode para navegar el scrollback con hjkl, copiar con y, buscar con /.
[[keyboard.bindings]]
key = "Escape"
mods = "Shift"
action = "ToggleViMode"
